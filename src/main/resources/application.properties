# ??? Application ?????????????????????????????????????????????????????????????
spring.application.name=PSolutions
server.port=${PORT:8085}

# ??? Database ?????????????????????????????????????????????????????????????????
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/pigmypay_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Snp@1817}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool tuning (HikariCP defaults)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ??? JPA / Hibernate ??????????????????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Suppress LazyInitializationException surprises
spring.jpa.open-in-view=false

# ??? Twilio WhatsApp Config ????????????????????????????????????????????????????
# IMPORTANT: Set these in environment variables or a secrets manager, NOT here in plaintext.
# For local dev, you may put them here temporarily.
# If left blank, NotificationService will gracefully skip sending (see NotificationService fix).
twilio.account.sid=temp1
twilio.auth.token=temp2
twilio.whatsapp.number=tempno.

# ??? File Upload (CSV ETL Pipeline) ??????????????????????????????????????????
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ??? Logging ??????????????????????????????????????????????????????????????????
logging.level.org.springframework.security=WARN
logging.level.com.pigmypay=INFO
logging.level.org.hibernate.SQL=WARN

# ??? Actuator (Health checks) ?????????????????????????????????????????????????
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized